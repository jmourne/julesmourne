<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JULES MOURNE | OPERATIONAL STRATEGY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --accent: #c5a059; --text: #d4d4d4; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Subtle texture overlay for prestige feel */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.05; pointer-events: none;
        }

        header { padding: 3rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Cinzel', serif; letter-spacing: 6px; font-size: 1.2rem; }
        
        .vault-btn { 
            text-decoration: none; color: var(--accent); border: 1px solid var(--accent);
            padding: 0.6rem 1.8rem; font-size: 0.7rem; letter-spacing: 2px;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .vault-btn:hover { background: var(--accent); color: #000; }

        section.hero {
            height: 70vh; display: flex; flex-direction: column; 
            justify-content: center; padding: 0 10%; max-width: 900px;
        }

        h1 { 
            font-family: 'Cinzel', serif; font-size: 4.5rem; line-height: 0.9; 
            margin: 0; text-transform: uppercase; color: #fff;
        }

        .subtitle { 
            margin-top: 2rem; font-size: 1.1rem; color: #888; 
            max-width: 600px; line-height: 1.6; letter-spacing: 1px;
        }

        .cta-group { margin-top: 4rem; display: flex; gap: 2rem; align-items: center; }
        .inquiry-link { color: #fff; text-decoration: none; border-bottom: 1px solid var(--accent); padding-bottom: 5px; font-size: 0.8rem; letter-spacing: 2px; }

        footer { padding: 4rem 10%; border-top: 1px solid #111; font-size: 0.6rem; letter-spacing: 3px; color: #444; }
    </style>
</head>
<body>

    <header>
        <div class="logo">JULES MOURNE</div>
        <a href="https://julesmourne.linear.app" class="vault-btn">THE VAULT</a>
    </header>

    <section class="hero">
        <h1>Command<br>Your Market.</h1>
        <div class="subtitle">
            End-to-end creative direction and operational strategy for high-end creators and firms. 
        </div>
        <div class="cta-group">
            <a href="mailto:critpathdigital@gmail.com" class="inquiry-link">INQUIRE FOR PARTNERSHIP</a>
        </div>
    </section>

    <footer>
        © 2026 JULES MOURNE. BY INVITATION ONLY.
    </footer>

</body>
</html>
